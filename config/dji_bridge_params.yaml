# NOTE: the top-level key below intentionally uses the ROS 2 wildcard "/**"
# instead of a specific node name. This file previously used
# "mcb_serial_bridge:", which never matched the node's actual name
# ("dji_serial_bridge", per dji_bridge.launch.py and the node's constructor),
# so every parameter here was silently ignored at runtime and the bridge
# always ran with hardcoded defaults regardless of what you set below.
# "/**" applies to whichever node loads this file, and stays correct even
# if the node is later renamed or remapped into a namespace.
/**:
  ros__parameters:
    # Serial device.  On Jetson: /dev/ttyTHS1 (onboard UART)
    # or /dev/ttyUSB0 / /dev/sllidar for CP210x USB adapters.
    device: /dev/ttyTHS1

    # Baud rate in bits-per-second.
    # Must match the MCB firmware (UARTCommunication driver).
    # Supported values: 115200, 230400, 460800, 921600, 2000000, 4000000
    # Default 115200 is safe for all adapters (CP210x, Type-C, onboard).
    baudrate: 115200

    # Milliseconds to block inside poll() waiting for incoming serial bytes.
    # Lower → lower latency from MCB to ROS; 10 ms is a good default.
    read_poll_ms: 10

    # Drop frames whose CRC-8 (header) or CRC-16 (full frame) does not match.
    # Set to false only for debugging raw byte traffic.
    enforce_crc: true

    # How often (seconds) to print the diagnostic stats summary to the console.
    # The summary shows bytes received, valid frames decoded, CRC error counts,
    # and published/subscribed message counts.  Set to 0 to disable.
    #
    # What you'll see in each case:
    #   bytes=0, frames=0          → nothing arriving at all (cable? power? baud?)
    #   bytes>0, frames=0          → bytes arriving but no valid frames (baud mismatch?
    #                                  CRC errors? wrong frame format?)
    #   bytes>0, frames>0, pose=0  → frames decoded but pose not publishing
    #                                  (unexpected msgType from MCB?)
    #   bytes>0, frames>0, pose>0  → everything healthy ✓
    diag_interval_s: 5
